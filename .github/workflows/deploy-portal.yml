name: Deploy Vulture Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Relational Substrate
        shell: pwsh
        run: |
          # 1. Initialize the SQLite DB in the cloud runner
          pwsh -NoProfile -ExecutionPolicy Bypass -File "00_Raw/PoShWiKi/wiki.ps1" init
          
          # 2. Sync the graph to populate the Links table
          pwsh -NoProfile -ExecutionPolicy Bypass -File "02_System/sync-vault-graph.ps1"

      - name: Compile Vulture Portal
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "02_System/generate-wiki.ps1" -Force

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./03_Web/public
          publish_branch: gh-pages
